<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SAM Scraper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            color: #1a1a1a;
            background: #fff;
        }
        .header {
            background: #1a1a1a;
            color: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-title { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .status-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .status-pill.polling    { background: #fef9c3; color: #854d0e; }
        .status-pill.connected  { background: #dcfce7; color: #166534; }
        .status-pill.stopped    { background: #f5f5f5; color: #666; }
        .status-pill.connecting { background: #dbeafe; color: #1e40af; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .polling   .status-dot  { background: #ca8a04; animation: blink 1.2s ease-in-out infinite; }
        .connected .status-dot  { background: #16a34a; }
        .stopped   .status-dot  { background: #999; }
        .connecting .status-dot { background: #3b82f6; animation: blink 0.6s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .settings-gear {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 16px;
            padding: 2px 4px;
            line-height: 1;
        }
        .settings-gear:hover { color: #fff; }

        /* Settings drawer — hidden by default */
        .settings-drawer {
            background: #f8f8f8;
            border-bottom: 1px solid #e5e5e5;
            padding: 14px 16px;
            display: none;
        }
        .settings-drawer.open { display: block; }
        .settings-drawer .field { margin-bottom: 8px; }
        .settings-drawer label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }
        .settings-drawer input {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 12px;
            outline: none;
            background: #fff;
        }
        .settings-drawer input:focus { border-color: #1a1a1a; }
        .settings-drawer .save-btn {
            width: 100%;
            padding: 8px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 4px;
        }

        .section { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; }
        .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #999; margin-bottom: 10px; }
        .btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 6px;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: default; }
        .btn-primary   { background: #1a1a1a; color: #fff; }
        .btn-warning   { background: #f59e0b; color: #fff; }
        .btn-secondary { background: #f5f5f5; color: #333; border: 1px solid #e5e5e5; }
        .tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
        .tag-waiting   { background: #fef3c7; color: #d97706; }
        .tag-running   { background: #dbeafe; color: #2563eb; }
        .tag-completed { background: #dcfce7; color: #16a34a; }
        .tag-failed    { background: #fee2e2; color: #dc2626; }
        .empty { text-align: center; padding: 20px; color: #bbb; font-size: 12px; }
        .auto-badge {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 11px;
            color: #166534;
            margin-bottom: 12px;
        }
        .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab {
            flex: 1; padding: 8px 6px; border-radius: 8px;
            background: #f5f5f5; border: 1px solid #e5e5e5;
            cursor: pointer; text-align: center; font-size: 11px; font-weight: 500;
            transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .tab:hover { background: #ececec; }
        .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
        .tab.tab-empty { color: #ccc; cursor: default; }
        .tab.tab-empty:hover { background: #f5f5f5; }
        .tab-property { font-weight: 600; }
        .tab-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .tab-dot.tag-waiting   { background: #f59e0b; }
        .tab-dot.tag-running   { background: #3b82f6; }
        .tab-dot.tag-completed { background: #22c55e; }
        .tab-dot.tag-failed    { background: #ef4444; }
        .tab-bridged { font-size: 9px; }
        .job-detail-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
        .job-detail-label { font-size: 11px; color: #888; }
        .job-detail-value { font-size: 12px; font-weight: 500; }
        .job-detail-value.mono { font-family: monospace; font-size: 11px; color: #555; }
        .job-actions { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
        .job-actions .btn { margin: 0; flex: 1; min-width: 80px; }
        .debugger-row { display: flex; align-items: center; justify-content: space-between; background: #f8f8f8; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; border: 1px solid #f0f0f0; }
        .debugger-label { font-size: 12px; font-weight: 500; }
        .debugger-status { font-size: 10px; color: #666; margin-top: 2px; }
        .handoff-banner { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px; padding: 10px 12px; font-size: 11px; color: #c2410c; margin: 8px 0; }
        .captcha-banner { background: #ff4500; border-radius: 8px; padding: 10px 12px; font-size: 12px; font-weight: 600; color: #fff; margin: 8px 0; animation: pulse 1.2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .s3-result { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 10px 12px; margin: 8px 0; }
        .s3-label { font-size: 11px; font-weight: 600; color: #166534; margin-bottom: 4px; }
        .s3-link { font-size: 10px; color: #2563eb; word-break: break-all; text-decoration: underline; display: block; }
        .s3-link:hover { color: #1d4ed8; }
        .log-section { margin-top: 12px; }
        .log-header { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #999; margin-bottom: 6px; }
        .log-feed { background: #0f0f0f; border-radius: 8px; padding: 8px; height: 220px; overflow-y: auto; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; line-height: 1.6; }
        .log-empty { color: #555; text-align: center; padding: 20px 0; }
        .log-line { display: flex; gap: 6px; margin-bottom: 1px; flex-wrap: wrap; }
        .log-time  { color: #2a2a2a; flex-shrink: 0; }
        .log-level { flex-shrink: 0; font-weight: 500; min-width: 56px; color: #2a2a2a; }
        .log-text  { color: #d4d4d4; word-break: break-word; flex: 1; }
        .log-info    .log-level { color: #2a4a6a; }
        .log-action  .log-level { color: #4a3a08; }
        .log-action  .log-text  { color: #e5e5e5; }
        .log-error   .log-level, .log-error   .log-text  { color: #f87171; }
        .log-handoff .log-level, .log-handoff .log-text  { color: #fb923c; }
        .log-complete .log-level, .log-complete .log-text { color: #4ade80; }
        .no-secret { text-align: center; padding: 30px 16px; color: #888; font-size: 12px; }
        .no-secret strong { display: block; font-size: 14px; color: #333; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="header">
    <span class="header-title">SAM Scraper</span>
    <div class="header-right">
        <button class="status-pill stopped" id="statusPill">
            <span class="status-dot"></span>
            <span id="statusText">Not connected</span>
        </button>
        <button class="settings-gear" id="settingsGear" title="Settings">⚙</button>
    </div>
</div>

<!-- Settings drawer (hidden by default, toggle with gear icon) -->
<div class="settings-drawer" id="settingsDrawer">
    <div class="field">
        <label>API URL</label>
        <input id="apiUrl" placeholder="http://localhost:4000" />
    </div>
    <div class="field">
        <label>API Secret</label>
        <input id="apiSecret" type="text" placeholder="supersecret" />
    </div>
    <div class="field">
        <label>Bridge Port</label>
        <input id="bridgePort" type="number" placeholder="9223" value="9223" />
    </div>
    <button class="save-btn" id="saveBtn">Save & Connect</button>
</div>

<!-- Debugger toggle (shown only when bridges active) -->
<div class="section" id="debuggerToggleSection" style="display:none;">
    <div class="debugger-row">
        <div>
            <div class="debugger-label">CDP Debugger</div>
            <div class="debugger-status" id="debuggerStatusText">attached</div>
        </div>
        <button id="debuggerToggleBtn" class="btn btn-secondary" style="width:auto;padding:5px 14px;margin:0;font-size:11px;">
            Detach
        </button>
    </div>
</div>

<!-- Active Jobs -->
<div class="section">
    <div class="auto-badge">⚡ Auto-connect — jobs start automatically when detected</div>
    <div id="jobList"><div class="empty">No active jobs</div></div>
    <button class="btn btn-secondary" id="refreshBtn" style="margin-top:8px;">Refresh</button>
</div>

<script src="popup.js"></script>
</body>
</html>
